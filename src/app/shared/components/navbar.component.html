<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/home" aria-label="Home Page">
      ProTectVinyl
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/shop" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">Shop</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/faq" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">FAQ</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/cart" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page"
             [attr.aria-label]="'Cart, ' + totalCount() + ' items'">
            Cart
            @if (totalCount() > 0) {
              <span class="badge bg-primary rounded-pill ms-1" aria-hidden="true">{{ totalCount() }}</span>
            }
          </a>
        </li>
        @if (isLoggedIn()) {
          <li class="nav-item dropdown ms-lg-2">
            <button type="button" class="nav-link dropdown-toggle border-0 bg-transparent"
                    id="accountMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
              Hi, {{ firstName() }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="accountMenuButton">
              @if (isAdmin()) {
                <li><a class="dropdown-item" routerLink="/admin/orders">Admin</a></li>
                <li><hr class="dropdown-divider"></li>
              }
              <li><a class="dropdown-item" routerLink="/account">Profile</a></li>
              <li><a class="dropdown-item" routerLink="/account/orders">My Orders</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><button type="button" class="dropdown-item" (click)="logout()">Log out</button></li>
            </ul>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">Log in</a>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary btn-sm" routerLink="/signup">Sign up</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
