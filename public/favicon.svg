<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ProTectVinyl">
  <!-- White rim keeps the mark legible on dark browser chrome -->
  <rect width="32" height="32" fill="#ffffff"/>
  <!-- Near full-bleed navy mass for light tabs -->
  <rect x="1" y="1" width="30" height="30" fill="#1f3a5f"/>
  <!-- Thick barrier strip — sized to stay clear at 16×16 -->
  <rect x="4" y="19" width="24" height="8" fill="#ffffff"/>
</svg>
